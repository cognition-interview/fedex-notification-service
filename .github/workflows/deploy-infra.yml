name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Deployment mode"
        required: true
        default: "what-if"
        type: choice
        options:
          - what-if
          - deploy
      assignAcrPullRole:
        description: "Create AcrPull role assignment (requires Owner/UAA permissions)"
        required: false
        default: false
        type: boolean

env:
  AZURE_RESOURCE_GROUP: fedex

jobs:
  deploy-infra:
    name: "${{ inputs.mode == 'what-if' && 'Preview infrastructure changes' || 'Deploy infrastructure' }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_APP_ID }}","clientSecret":"${{ secrets.AZURE_PASSWORD }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ vars.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Validate all ARM templates
        run: |
          echo "Validating acr.json..."
          az deployment group validate \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/acr.json \
            --output none
          echo "Validating aks.json..."
          az deployment group validate \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/aks.json \
            --parameters assignAcrPullRole=${{ inputs.assignAcrPullRole }} \
            --output none
          echo "Validating communication.json..."
          az deployment group validate \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/communication.json \
            --output none
          echo "Validating function-app.json..."
          az deployment group validate \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/function-app.json \
            --output none
          echo "All templates valid."

      - name: Check which resources already exist
        id: check
        run: |
          ACR_NAME=$(jq -r '.parameters.acrName.value' infra/azuredeploy.parameters.json)
          AKS_NAME=$(jq -r '.parameters.aksClusterName.value' infra/azuredeploy.parameters.json)
          COMM_NAME=$(jq -r '.parameters.communicationServiceName.value' infra/azuredeploy.parameters.json)
          FUNC_NAME=$(jq -r '.parameters.functionAppName.value' infra/azuredeploy.parameters.json)
          FUNC_SA_NAME=$(jq -r '.parameters.functionStorageAccountName.value' infra/azuredeploy.parameters.json)

          check() {
            az resource show --resource-group "$AZURE_RESOURCE_GROUP" \
              --resource-type "$1" --name "$2" --output none 2>/dev/null
          }

          if check "Microsoft.ContainerRegistry/registries" "$ACR_NAME"; then
            echo "  ✓ ACR ($ACR_NAME) exists"
            echo "acr=exists" >> "$GITHUB_OUTPUT"
          else
            echo "  ✗ ACR ($ACR_NAME) missing"
            echo "acr=missing" >> "$GITHUB_OUTPUT"
          fi

          if check "Microsoft.ContainerService/managedClusters" "$AKS_NAME"; then
            echo "  ✓ AKS ($AKS_NAME) exists"
            echo "aks=exists" >> "$GITHUB_OUTPUT"
          else
            echo "  ✗ AKS ($AKS_NAME) missing"
            echo "aks=missing" >> "$GITHUB_OUTPUT"
          fi

          if check "Microsoft.Communication/communicationServices" "$COMM_NAME"; then
            echo "  ✓ Communication Services ($COMM_NAME) exists"
            echo "comm=exists" >> "$GITHUB_OUTPUT"
          else
            echo "  ✗ Communication Services ($COMM_NAME) missing"
            echo "comm=missing" >> "$GITHUB_OUTPUT"
          fi

          if check "Microsoft.Web/sites" "$FUNC_NAME"; then
            echo "  ✓ Function App ($FUNC_NAME) exists"
            echo "funcapp=exists" >> "$GITHUB_OUTPUT"
          else
            echo "  ✗ Function App ($FUNC_NAME) missing"
            echo "funcapp=missing" >> "$GITHUB_OUTPUT"
          fi

      - name: What-if preview (all templates)
        if: inputs.mode == 'what-if'
        run: |
          echo "=== ACR ==="
          az deployment group what-if \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/acr.json
          echo ""
          echo "=== AKS ==="
          az deployment group what-if \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/aks.json \
            --parameters assignAcrPullRole=${{ inputs.assignAcrPullRole }}
          echo ""
          echo "=== Communication Services ==="
          az deployment group what-if \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/communication.json
          echo ""
          echo "=== Function App ==="
          az deployment group what-if \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/function-app.json

      - name: Deploy ACR
        if: inputs.mode == 'deploy' && steps.check.outputs.acr == 'missing'
        run: |
          echo "▶ Deploying ACR..."
          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "fedex-acr-$(date +%Y%m%d-%H%M%S)" \
            --template-file infra/acr.json \
            --output table

      - name: Deploy AKS
        if: inputs.mode == 'deploy' && steps.check.outputs.aks == 'missing'
        run: |
          echo "▶ Deploying AKS (this may take 10-15 minutes)..."
          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "fedex-aks-$(date +%Y%m%d-%H%M%S)" \
            --template-file infra/aks.json \
            --parameters assignAcrPullRole=${{ inputs.assignAcrPullRole }} \
            --output table

      - name: Deploy Communication Services
        if: inputs.mode == 'deploy' && steps.check.outputs.comm == 'missing'
        run: |
          echo "▶ Deploying Communication Services..."
          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "fedex-comm-$(date +%Y%m%d-%H%M%S)" \
            --template-file infra/communication.json \
            --output table

      - name: Deploy Function App
        if: inputs.mode == 'deploy' && steps.check.outputs.funcapp == 'missing'
        run: |
          echo "▶ Deploying Function App..."
          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "fedex-funcapp-$(date +%Y%m%d-%H%M%S)" \
            --template-file infra/function-app.json \
            --parameters \
              postgresConnectionString="${{ secrets.POSTGRES_CONNECTION_STRING }}" \
              azureEmailConnectionString="${{ secrets.AZURE_EMAIL_CONNECTION_STRING }}" \
              azureEmailFromAddress="${{ secrets.AZURE_EMAIL_FROM_ADDRESS }}" \
            --output table

      - name: Deploy summary
        if: inputs.mode == 'deploy'
        run: |
          echo "═══════════════════════════════════════════════════════════════════"
          if [[ "${{ steps.check.outputs.acr }}" == "exists" && \
                "${{ steps.check.outputs.aks }}" == "exists" && \
                "${{ steps.check.outputs.comm }}" == "exists" && \
                "${{ steps.check.outputs.funcapp }}" == "exists" ]]; then
            echo "  All resources already exist — nothing was deployed."
          else
            echo "  Deployment complete. Deployed:"
            [[ "${{ steps.check.outputs.acr }}" == "missing" ]] && echo "    - ACR"
            [[ "${{ steps.check.outputs.aks }}" == "missing" ]] && echo "    - AKS"
            [[ "${{ steps.check.outputs.comm }}" == "missing" ]] && echo "    - Communication Services"
            [[ "${{ steps.check.outputs.funcapp }}" == "missing" ]] && echo "    - Function App"
          fi
          echo "═══════════════════════════════════════════════════════════════════"
