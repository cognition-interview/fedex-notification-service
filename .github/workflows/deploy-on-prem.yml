name: Deploy to On-Prem

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Provision & deploy to on-prem
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_APP_ID }}","clientSecret":"${{ secrets.AZURE_PASSWORD }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ vars.AZURE_SUBSCRIPTION_ID }}"}'
          auth-type: SERVICE_PRINCIPAL

      - name: Encode .env payload
        id: env_payload
        run: |
          ENV_B64=$(printf 'AZURE_EMAIL_CONNECTION_STRING=%s\nAZURE_EMAIL_FROM_ADDRESS=%s\nPOSTGRES_CONNECTION_STRING=%s\n' \
            "${{ secrets.AZURE_EMAIL_CONNECTION_STRING }}" \
            "${{ secrets.AZURE_EMAIL_FROM_ADDRESS }}" \
            "${{ secrets.POSTGRES_CONNECTION_STRING }}" \
            | base64 -w0)
          echo "value=$ENV_B64" >> "$GITHUB_OUTPUT"

      - name: Provision & deploy on VM
        run: |
          cat > /tmp/vm-deploy.sh << 'VMSCRIPT'
          #!/bin/bash
          set -euo pipefail

          export HOME=/root
          export COMPOSER_HOME=/root/.composer
          export DEBIAN_FRONTEND=noninteractive

          APP_DIR=/var/www/app
          WEB_ROOT=/var/www/html
          REPO_URL='https://github.com/${{ github.repository }}.git'

          # ── Provision (idempotent) ─────────────────────────────────────

          if ! command -v nginx &>/dev/null; then
            apt-get update -q && apt-get install -y -q nginx rsync git
          fi

          if ! systemctl is-active --quiet php8.3-fpm; then
            apt-get update -q
            apt-get install -y -q software-properties-common
            add-apt-repository -y ppa:ondrej/php
            apt-get update -q
            apt-get install -y -q php8.3-fpm php8.3-pgsql php8.3-mbstring php8.3-xml php8.3-curl
          fi

          command -v composer &>/dev/null || curl -fsSL https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer

          if ! command -v node &>/dev/null; then
            curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
            apt-get install -y -q nodejs
          fi

          if [ ! -d "$APP_DIR/.git" ]; then
            mkdir -p "$APP_DIR" "$WEB_ROOT"
            git clone "$REPO_URL" "$APP_DIR"
          fi

          if [ ! -f /etc/nginx/sites-available/app ]; then
            cat > /etc/nginx/sites-available/app << 'NGINX'
          server {
              listen 80;
              server_name _;

              root /var/www/html;
              index index.html;

              location / {
                  try_files $uri $uri/ /index.html;
              }

              location /api {
                  root /var/www/app/backend/public;
                  fastcgi_pass unix:/run/php/php8.3-fpm.sock;
                  fastcgi_index index.php;
                  fastcgi_param SCRIPT_FILENAME /var/www/app/backend/public/index.php;
                  include fastcgi_params;
              }
          }
          NGINX
            ln -sf /etc/nginx/sites-available/app /etc/nginx/sites-enabled/app
            rm -f /etc/nginx/sites-enabled/default
            nginx -t
          fi

          systemctl enable --now php8.3-fpm
          systemctl enable --now nginx

          # ── Deploy ─────────────────────────────────────────────────────

          echo "$1" | base64 -d > "$APP_DIR/.env"
          chown www-data:www-data "$APP_DIR/.env"
          chmod 640 "$APP_DIR/.env"

          git -C "$APP_DIR" pull origin main

          composer install --working-dir="$APP_DIR/backend" --no-dev --no-interaction --optimize-autoloader

          cd "$APP_DIR/frontend"
          npm ci
          npm run build

          rsync -a --delete "$APP_DIR/frontend/dist/frontend/browser/" "$WEB_ROOT/"

          systemctl reload php8.3-fpm
          systemctl reload nginx
          VMSCRIPT

          az vm run-command invoke \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name           "${{ vars.AZURE_VM_NAME }}" \
            --command-id     RunShellScript \
            --parameters     "${{ steps.env_payload.outputs.value }}" \
            --scripts        @/tmp/vm-deploy.sh
