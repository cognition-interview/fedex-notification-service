name: Deploy to AKS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "production"
        type: choice
        options:
          - production
          - staging

env:
  ACR_NAME: fedexcr
  AKS_CLUSTER: fedex-k8-cluster
  AZURE_RESOURCE_GROUP: fedex
  NAMESPACE: fedex

jobs:
  # ── 1. Run tests before deploying ──────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_pgsql

      - name: Install backend dependencies
        run: composer install --working-dir=backend --no-interaction

      - name: Run PHPUnit
        run: cd backend && ./vendor/bin/phpunit

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: cd frontend && npm test

  # ── 2. Build & push container images ───────────────────────────────────────
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_APP_ID }}","clientSecret":"${{ secrets.AZURE_PASSWORD }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ vars.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Log in to ACR
        run: az acr login --name "$ACR_NAME"

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Install backend dependencies
        run: composer install --working-dir=backend --no-dev --no-interaction --optimize-autoloader --prefer-dist

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Build & push backend
        run: |
          docker build \
            -t "fedexcr.azurecr.io/fedex-backend:${{ steps.meta.outputs.tag }}" \
            -f docker/backend/Dockerfile .
          docker push "fedexcr.azurecr.io/fedex-backend:${{ steps.meta.outputs.tag }}"

      - name: Build & push frontend
        run: |
          docker build \
            -t "fedexcr.azurecr.io/fedex-frontend:${{ steps.meta.outputs.tag }}" \
            -f docker/frontend/Dockerfile .
          docker push "fedexcr.azurecr.io/fedex-frontend:${{ steps.meta.outputs.tag }}"

  # ── 3. Deploy to AKS ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_APP_ID }}","clientSecret":"${{ secrets.AZURE_PASSWORD }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ vars.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AKS_CLUSTER" \
            --overwrite-existing

      - name: Create or update backend-secrets
        run: |
          kubectl create secret generic backend-secrets \
            --namespace "$NAMESPACE" \
            --from-literal=POSTGRES_CONNECTION_STRING='${{ secrets.POSTGRES_CONNECTION_STRING }}' \
            --from-literal=AZURE_EMAIL_CONNECTION_STRING='${{ secrets.AZURE_EMAIL_CONNECTION_STRING }}' \
            --from-literal=AZURE_EMAIL_FROM_ADDRESS='${{ secrets.AZURE_EMAIL_FROM_ADDRESS }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Ensure NGINX Ingress Controller is installed
        run: |
          if ! kubectl get deployment ingress-nginx-controller -n ingress-nginx &>/dev/null; then
            echo "Installing NGINX Ingress Controller..."
            kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.12.1/deploy/static/provider/cloud/deploy.yaml
            echo "Waiting for ingress controller to be ready..."
            kubectl rollout status deployment/ingress-nginx-controller -n ingress-nginx --timeout=120s
          else
            echo "NGINX Ingress Controller already installed."
          fi

      - name: Clean up stale ReplicaSets
        run: |
          for deploy in backend frontend; do
            for rs in $(kubectl get rs -n "$NAMESPACE" -l app=$deploy -o jsonpath='{range .items[?(@.spec.replicas==0)]}{.metadata.name}{"\n"}{end}'); do
              echo "Deleting stale ReplicaSet: $rs"
              kubectl delete rs "$rs" -n "$NAMESPACE"
            done
          done

      - name: Apply Kubernetes manifests
        env:
          TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/ingress.yaml

          sed "s|image: IMAGE_PLACEHOLDER|image: fedexcr.azurecr.io/fedex-backend:${TAG}|" \
            k8s/backend-deployment.yaml | kubectl apply -f -

          sed "s|image: IMAGE_PLACEHOLDER|image: fedexcr.azurecr.io/fedex-frontend:${TAG}|" \
            k8s/frontend-deployment.yaml | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend  -n "$NAMESPACE" --timeout=120s
          kubectl rollout status deployment/frontend -n "$NAMESPACE" --timeout=120s

      - name: Print deployment status
        if: always()
        run: |
          echo "── Pods ──"
          kubectl get pods -n "$NAMESPACE"
          echo ""
          echo "── Ingress ──"
          kubectl get ingress -n "$NAMESPACE"
          echo ""
          echo "── Public Endpoint ──"
          EXTERNAL_IP=$(kubectl get svc ingress-nginx-controller -n ingress-nginx -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
          if [ -n "$EXTERNAL_IP" ]; then
            echo "App URL:      http://${EXTERNAL_IP}"
            echo "API endpoint: http://${EXTERNAL_IP}/api/businesses?limit=1"
          else
            echo "⚠ Ingress controller external IP not yet assigned. Run:"
            echo "  kubectl get svc -n ingress-nginx ingress-nginx-controller"
          fi
