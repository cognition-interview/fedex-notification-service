<div class="shell">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-fedex">FedEx</span>
      <span class="logo-sub">Tracking System</span>
    </div>
    <nav class="sidebar-nav">
      <a routerLink="/businesses" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🏢</span> Businesses
      </a>
      <a routerLink="/orders" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📋</span> Orders
      </a>
      <a routerLink="/insights" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📊</span> Insights
      </a>
      <a routerLink="/update-status" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">✏️</span> Update Status
      </a>
    </nav>
  </aside>

  <!-- Main area -->
  <div class="main-area">
    <!-- Header -->
    <header class="top-header">
      <div class="header-title">FedEx Tracking Dashboard</div>
      <div class="header-right">
        <div class="business-selector">
          <label>Business:</label>
          <select [ngModel]="selectedBusinessId" (ngModelChange)="onBusinessChange($event)">
            <option value="">All Businesses</option>
            <option *ngFor="let b of businesses" [value]="b.id">{{ b.name }}</option>
          </select>
        </div>
        <div class="bell-wrap">
          <button class="bell-btn" (click)="toggleBell()">
            🔔
            <span *ngIf="unreadCount > 0" class="bell-badge">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
          </button>
          <div *ngIf="bellOpen" class="bell-dropdown">
            <div class="bell-header">Recent Notifications</div>
            <div *ngIf="recentNotifications.length === 0" class="bell-empty">No unread notifications</div>
            <div *ngFor="let n of recentNotifications" class="bell-item" (click)="goToOrder(n.order_id)">
              <span class="bell-icon">{{ notifIcon(n.type) }}</span>
              <div class="bell-msg">
                <div class="bell-text">{{ n.message }}</div>
                <div class="bell-time">{{ formatRelative(n.created_at) }}</div>
              </div>
            </div>
            <div class="bell-footer">
              <a routerLink="/notifications" (click)="closeBell()">View all notifications →</a>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Content -->
    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
