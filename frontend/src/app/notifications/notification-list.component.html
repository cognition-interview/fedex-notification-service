<div class="page-header" style="display:flex; justify-content: space-between; align-items: flex-start;">
  <div>
    <h1>Notifications</h1>
    <p>{{ total }} notification(s)</p>
  </div>
  <button *ngIf="unreadCount > 0 && activeTab !== 'read'" class="btn btn-sm btn-orange" (click)="markAllAsRead()">Mark All as Read</button>
</div>

<div class="tab-bar">
  <button class="tab" [class.active]="activeTab === 'all'" (click)="setTab('all')">All</button>
  <button class="tab" [class.active]="activeTab === 'unread'" (click)="setTab('unread')">Unread</button>
  <button class="tab" [class.active]="activeTab === 'read'" (click)="setTab('read')">Read</button>
</div>

<div *ngIf="loading" class="no-data">Loading...</div>
<div *ngIf="!loading && notifications.length === 0" class="no-data">No notifications found.</div>
<div *ngIf="!loading && notifications.length > 0" class="notif-list">
  <div *ngFor="let n of notifications" class="notif-item" [class.unread]="!n.is_read" (click)="markAsRead(n)">
    <span class="notif-icon">{{ notifIcon(n.type) }}</span>
    <div class="notif-body">
      <div class="notif-message">{{ n.message }}</div>
      <div class="notif-meta">
        <span class="notif-time">{{ formatRelative(n.created_at) }}</span>
        <span *ngIf="!n.is_read" class="unread-dot">●</span>
      </div>
    </div>
  </div>
</div>

<div *ngIf="total > limit" class="pagination">
  <button class="btn btn-sm btn-outline" (click)="prevPage()" [disabled]="page === 1">← Prev</button>
  <span>{{ pageStart }}–{{ pageEnd }} of {{ total }}</span>
  <button class="btn btn-sm btn-outline" (click)="nextPage()" [disabled]="page >= totalPages">Next →</button>
</div>
