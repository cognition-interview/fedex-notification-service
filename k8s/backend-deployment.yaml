apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: fedex
  labels:
    app: backend
    app.kubernetes.io/part-of: fedex-notification-service
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # Replaced by CI/CD or deploy.sh with the real ACR image tag
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 80
              protocol: TCP
          envFrom:
            - secretRef:
                name: backend-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/businesses?limit=1
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
