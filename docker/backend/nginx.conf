server {
    listen 80;
    server_name _;

    root /var/www/backend/public;
    index index.php;

    # Proxy order status updates to Azure Function
    location ~ ^/api/orders/([^/]+)/status$ {
        proxy_pass https://fedex-update-status.azurewebsites.net/api/orders/$1/status;
        proxy_set_header Host fedex-update-status.azurewebsites.net;
        proxy_set_header Content-Type $content_type;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
    }

    # Route everything else through Slim's front controller
    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Pass standard proxy headers for Kubernetes
        fastcgi_param HTTP_X_FORWARDED_FOR  $http_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
    }

    # Deny access to dotfiles
    location ~ /\. {
        deny all;
    }
}
